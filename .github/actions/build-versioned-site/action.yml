name: 'Build Versioned Site'
description: 'Builds landing page from latest tag and versioned docs under /docs/<version>/'

inputs:
  retention_count:
    description: 'Number of most recent semver tags to build'
    required: false
    default: '3'

outputs:
  output_dir:
    description: 'Path to the combined output directory'
    value: ${{ steps.build.outputs.output_dir }}
  latest_version:
    description: 'The latest semver tag that was built'
    value: ${{ steps.build.outputs.latest_version }}

runs:
  using: 'composite'
  steps:
    - name: Build versioned site
      id: build
      shell: bash
      env:
        RETENTION_COUNT: ${{ inputs.retention_count }}
      run: |
        set -euo pipefail

        OUTPUT_DIR="${GITHUB_WORKSPACE}/versioned-site-output"
        mkdir -p "${OUTPUT_DIR}"

        # Discover the N most recent semver tags
        TAGS=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
          | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
          | sort -V -r \
          | head -n "${RETENTION_COUNT}")

        if [ -z "${TAGS}" ]; then
          echo "::error::No semver tags found matching v*.*.*"
          exit 1
        fi

        LATEST_VERSION=$(echo "${TAGS}" | head -n 1)
        echo "Discovered tags (newest first):"
        echo "${TAGS}"
        echo "Latest version: ${LATEST_VERSION}"

        # Build the version dropdown list for Docsy theme
        VERSIONS_FILE="${RUNNER_TEMP}/versions.yaml"
        : > "${VERSIONS_FILE}"
        while IFS= read -r tag; do
          DISPLAY_NAME="${tag}"
          if [ "${tag}" = "${LATEST_VERSION}" ]; then
            DISPLAY_NAME="${tag} (latest)"
          fi
          echo "- version: \"${DISPLAY_NAME}\"" >> "${VERSIONS_FILE}"
          echo "  url: \"/docs/${tag}/\"" >> "${VERSIONS_FILE}"
        done <<< "${TAGS}"

        echo "Versions file:"
        cat "${VERSIONS_FILE}"

        # =====================================================================
        # Phase 1: Build landing page from latest tag
        # =====================================================================
        echo ""
        echo "========================================="
        echo "Phase 1: Building landing page from ${LATEST_VERSION}"
        echo "========================================="

        LANDING_DIR="${RUNNER_TEMP}/site-landing"
        mkdir -p "${LANDING_DIR}"

        git archive "${LATEST_VERSION}" -- site/ | tar -x -C "${LANDING_DIR}"

        LANDING_SITE="${LANDING_DIR}/site"
        yq eval -i '.baseURL = "https://aicr.dgxc.io/"' "${LANDING_SITE}/hugo.yaml"
        yq eval -i ".params.versions = load(\"${VERSIONS_FILE}\")" "${LANDING_SITE}/hugo.yaml"

        (cd "${LANDING_SITE}" && npm ci --prefer-offline --no-audit 2>/dev/null)
        (cd "${LANDING_SITE}" && hugo --minify)

        # Copy everything EXCEPT docs/ to output root
        # This preserves the landing page, static assets, CSS, JS, etc.
        rsync -a --exclude='docs/' "${LANDING_SITE}/public/" "${OUTPUT_DIR}/"

        rm -rf "${LANDING_DIR}"

        # =====================================================================
        # Phase 2: Build versioned docs for each tag
        # =====================================================================
        while IFS= read -r tag; do
          echo ""
          echo "========================================="
          echo "Phase 2: Building docs for ${tag}"
          echo "========================================="

          WORK_DIR="${RUNNER_TEMP}/site-build-${tag}"
          mkdir -p "${WORK_DIR}"

          git archive "${tag}" -- site/ | tar -x -C "${WORK_DIR}"

          SITE_DIR="${WORK_DIR}/site"
          if [ ! -d "${SITE_DIR}" ]; then
            echo "::warning::Tag ${tag} has no site/ directory, skipping"
            continue
          fi

          # Restructure content: move docs/* into docs/<version>/*
          # This makes Hugo generate URLs like /docs/<version>/user/cli/
          DOCS_DIR="${SITE_DIR}/content/docs"
          if [ -d "${DOCS_DIR}" ]; then
            TEMP_DOCS="${SITE_DIR}/content/docs-orig"
            mv "${DOCS_DIR}" "${TEMP_DOCS}"
            mkdir -p "${DOCS_DIR}/${tag}"
            mv "${TEMP_DOCS}"/* "${DOCS_DIR}/${tag}/"
            rm -rf "${TEMP_DOCS}"

            # Create a top-level docs _index.md (section root)
            printf '%s\n' \
              '---' \
              'title: "Documentation"' \
              'linkTitle: "Documentation"' \
              'weight: 1' \
              '---' > "${DOCS_DIR}/_index.md"
          fi

          # Patch hugo config
          yq eval -i '.baseURL = "https://aicr.dgxc.io/"' "${SITE_DIR}/hugo.yaml"
          yq eval -i ".params.versions = load(\"${VERSIONS_FILE}\")" "${SITE_DIR}/hugo.yaml"

          (cd "${SITE_DIR}" && npm ci --prefer-offline --no-audit 2>/dev/null)
          (cd "${SITE_DIR}" && hugo --minify)

          # Copy only the versioned docs to output
          if [ -d "${SITE_DIR}/public/docs/${tag}" ]; then
            mkdir -p "${OUTPUT_DIR}/docs/${tag}"
            rsync -a "${SITE_DIR}/public/docs/${tag}/" "${OUTPUT_DIR}/docs/${tag}/"
            echo "Copied docs for ${tag}"
          else
            echo "::warning::Hugo build for ${tag} did not produce docs/${tag}/"
          fi

          rm -rf "${WORK_DIR}"
        done <<< "${TAGS}"

        # =====================================================================
        # Phase 3: Generate /docs/index.html redirect to latest version
        # =====================================================================
        mkdir -p "${OUTPUT_DIR}/docs"
        DOCS_URL="/docs/${LATEST_VERSION}/"
        printf '%s\n' \
          '<!DOCTYPE html>' \
          '<html lang="en">' \
          '<head>' \
          '  <meta charset="utf-8">' \
          '  <title>Redirecting to latest docs...</title>' \
          "  <meta http-equiv=\"refresh\" content=\"0; url=${DOCS_URL}\">" \
          "  <link rel=\"canonical\" href=\"https://aicr.dgxc.io${DOCS_URL}\">" \
          '</head>' \
          '<body>' \
          "  <p>Redirecting to <a href=\"${DOCS_URL}\">${LATEST_VERSION} docs</a>...</p>" \
          "  <script>window.location.replace(\"${DOCS_URL}\");</script>" \
          '</body>' \
          '</html>' > "${OUTPUT_DIR}/docs/index.html"

        echo ""
        echo "========================================="
        echo "Versioned site build complete"
        echo "Output directory: ${OUTPUT_DIR}"
        echo "Latest version: ${LATEST_VERSION}"
        echo "Contents:"
        ls -la "${OUTPUT_DIR}"
        echo "docs/:"
        ls -la "${OUTPUT_DIR}/docs/"
        echo "========================================="

        echo "output_dir=${OUTPUT_DIR}" >> "${GITHUB_OUTPUT}"
        echo "latest_version=${LATEST_VERSION}" >> "${GITHUB_OUTPUT}"
