# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cli-bundle-attestation-ci
  labels:
    requires: attested-binary
    ci: "true" # required binary built in CI
spec:
  description: |
    Full attestation chain tests. Requires an attested binary (AICR_ATTESTED=true)
    and OIDC authentication. Only runs in CI via the cli-e2e action.
    Use --selector 'requires!=attested-binary' to skip locally.
  timeouts:
    exec: 60s
  steps:
    - name: setup
      description: Generate recipe for attested bundle tests.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-ci"
              rm -rf "${WORK}" && mkdir -p "${WORK}"
              ${AICR_BIN} recipe --service eks --accelerator h100 --os ubuntu \
                --intent training -o "${WORK}/recipe.yaml"
            check:
              ($error == null): true

    - name: create-attested-bundle
      description: Create bundle with real Sigstore attestation.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-ci"
              IDENTITY_REGEXP="${AICR_IDENTITY_REGEXP:-https://github.com/NVIDIA/aicr/.github/workflows/.*}"
              ${AICR_BIN} bundle -r "${WORK}/recipe.yaml" -o "${WORK}/bundle" \
                --attest --certificate-identity-regexp "${IDENTITY_REGEXP}"
            check:
              ($error == null): true

    - name: attested-bundle-has-files
      description: Attested bundle contains both attestation files.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-bundle-attestation-ci"
              test -f "${WORK}/bundle/attestation/bundle-attestation.sigstore.json"
              test -f "${WORK}/bundle/attestation/aicr-attestation.sigstore.json"
              test -f "${WORK}/bundle/checksums.txt"
              test -f "${WORK}/bundle/recipe.yaml"
            check:
              ($error == null): true

    - name: verify-full-chain
      description: Verify full attestation chain with relaxed identity regexp.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-ci"
              ${AICR_BIN} verify "${WORK}/bundle" \
                --certificate-identity-regexp 'https://github.com/NVIDIA/aicr/.github/workflows/.*' \
                --format json
            check:
              ($error == null): true
              (contains($stdout, 'checksumsPassed')): true
              (contains($stdout, 'bundleAttested')): true

    - name: verify-min-trust-attested
      description: Attested bundle meets --min-trust-level attested.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-ci"
              ${AICR_BIN} verify "${WORK}/bundle" \
                --certificate-identity-regexp 'https://github.com/NVIDIA/aicr/.github/workflows/.*' \
                --min-trust-level attested
            check:
              ($error == null): true

    - name: verify-min-trust-verified
      description: Attested bundle meets --min-trust-level verified (full chain).
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-ci"
              ${AICR_BIN} verify "${WORK}/bundle" \
                --certificate-identity-regexp 'https://github.com/NVIDIA/aicr/.github/workflows/.*' \
                --min-trust-level verified
            check:
              ($error == null): true

    - name: verify-min-trust-max
      description: --min-trust-level max passes for fully attested bundle.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-ci"
              ${AICR_BIN} verify "${WORK}/bundle" \
                --certificate-identity-regexp 'https://github.com/NVIDIA/aicr/.github/workflows/.*' \
                --min-trust-level max
            check:
              ($error == null): true
              (contains($stdout, 'PASSED') || contains($stderr, 'PASSED')): true

    - name: verify-shows-identity
      description: Verification output includes creator identity and builder.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-ci"
              ${AICR_BIN} verify "${WORK}/bundle" \
                --certificate-identity-regexp 'https://github.com/NVIDIA/aicr/.github/workflows/.*'
            check:
              ($error == null): true
              (contains($stdout, 'Bundle attested by') || contains($stderr, 'Bundle attested by')): true
              (contains($stdout, 'Binary built by') || contains($stderr, 'Binary built by')): true
              (contains($stdout, 'Identity pinned') || contains($stderr, 'Identity pinned')): true

    - name: verify-json-has-all-fields
      description: JSON output contains attestation-specific fields.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-ci"
              ${AICR_BIN} verify "${WORK}/bundle" \
                --certificate-identity-regexp 'https://github.com/NVIDIA/aicr/.github/workflows/.*' \
                --format json
            check:
              ($error == null): true
              (contains($stdout, 'bundleAttested')): true
              (contains($stdout, 'binaryAttested')): true
              (contains($stdout, 'identityPinned')): true
              (contains($stdout, '"verified"')): true
              (contains($stdout, 'bundleCreator')): true
              (contains($stdout, 'binaryBuilder')): true

    - name: verify-tamper-detection
      description: Tampering with attested bundle is detected.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-ci"
              # Tamper with a file
              echo "tampered" >> "${WORK}/bundle/deploy.sh"
              OUTPUT=$(${AICR_BIN} verify "${WORK}/bundle" \
                --certificate-identity-regexp 'https://github.com/NVIDIA/aicr/.github/workflows/.*' \
                --format json --min-trust-level unknown 2>&1)
              echo "$OUTPUT"
              echo "$OUTPUT" | grep -q '"checksumsPassed": false'
            check:
              ($error == null): true

    - name: rebuild-for-remaining-tests
      description: Rebuild clean attested bundle for remaining tests.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-ci"
              IDENTITY_REGEXP="${AICR_IDENTITY_REGEXP:-https://github.com/NVIDIA/aicr/.github/workflows/.*}"
              rm -rf "${WORK}/bundle"
              ${AICR_BIN} bundle -r "${WORK}/recipe.yaml" -o "${WORK}/bundle" \
                --attest --certificate-identity-regexp "${IDENTITY_REGEXP}"
            check:
              ($error == null): true

    - name: verify-default-pattern-fails
      description: Verification with default identity pattern fails (not on-tag workflow).
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-ci"
              OUTPUT=$(${AICR_BIN} verify "${WORK}/bundle" --min-trust-level unknown 2>&1)
              echo "$OUTPUT"
              # Should show attested (not verified) because binary attestation fails default pattern
              echo "$OUTPUT" | grep -q 'attested'
            check:
              ($error == null): true

    - name: verify-invalid-pattern-rejected
      description: Invalid --certificate-identity-regexp is rejected.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-bundle-attestation-ci"
              ${AICR_BIN} verify "${WORK}/bundle" \
                --certificate-identity-regexp '.*' 2>&1 || true
            check:
              (contains($stdout, 'must contain') || contains($stderr, 'must contain')): true

    - name: cleanup
      description: Remove temporary files.
      try:
        - script:
            content: |
              rm -rf /tmp/chainsaw-bundle-attestation-ci
